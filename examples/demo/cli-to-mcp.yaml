# 演示：GitHub CLI (gh) + Git — lazy 暴露 + 并发发现（端口 28989）
version: 1

connectors:
  - name: gh
    binary: gh
    enabled: true
    default_timeout_seconds: 30
    discovery:
      mode: help
      parser: cobra
      max_depth: 3
      concurrency: 8
      exposure_mode: lazy
      materialize_global_args: false
    skills:
      - ../gh/skills/gh.md

  - name: git
    binary: git
    enabled: true
    default_timeout_seconds: 30
    discovery:
      mode: help
      parser: generic
      max_depth: 2
      concurrency: 4
      exposure_mode: lazy
      materialize_global_args: false
    skills:
      - ../git/skills/git.md

tools:
  gh_pr_view:
    enabled: true
    connector: gh
    command: ["pr", "view"]
    description: View a GitHub pull request by number, URL, or branch.
    args:
      number:
        type: integer
        required: false
    default_args: ["--json", "number,title,state,author,body,url"]
    output:
      format: json

  gh_pr_list:
    enabled: true
    connector: gh
    command: ["pr", "list"]
    description: List pull requests in the current repository.
    default_args: ["--json", "number,title,state,author,url", "-L", "30"]
    output:
      format: json